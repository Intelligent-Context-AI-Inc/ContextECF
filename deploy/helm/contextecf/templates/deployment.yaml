{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "contextecf.namespace" $ }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "contextecf.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/part-of: contextecf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/part-of: contextecf
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ printf "%s/%s:%s" $.Values.global.imageRegistry $name $.Values.global.imageTag }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: contextecf-config
          env:
            - name: PORT
              value: {{ $svc.port | quote }}
            - name: NODE_ENV
              value: {{ ternary "production" $.Values.global.environment (eq $.Values.global.environment "prod") | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: contextecf-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: contextecf-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: contextecf-secrets
                  key: jwt-secret
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $.Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.healthCheck.liveness.periodSeconds }}
            timeoutSeconds: {{ $.Values.healthCheck.liveness.timeoutSeconds }}
            failureThreshold: {{ $.Values.healthCheck.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $.Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.healthCheck.readiness.periodSeconds }}
            timeoutSeconds: {{ $.Values.healthCheck.readiness.timeoutSeconds }}
            failureThreshold: {{ $.Values.healthCheck.readiness.failureThreshold }}
{{- end }}
{{- end }}
