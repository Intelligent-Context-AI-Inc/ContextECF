apiVersion: v1
kind: ConfigMap
metadata:
  name: contextecf-config
  namespace: {{ include "contextecf.namespace" . }}
  labels:
    {{- include "contextecf.labels" . | nindent 4 }}
data:
  TENANT_ID: {{ .Values.global.tenantId | quote }}
  TENANT_NAME: {{ .Values.global.tenantName | quote }}
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  REGION: {{ .Values.global.region | quote }}
  DEPLOYMENT_MODEL: {{ .Values.global.deploymentModel | quote }}
  PLACEMENT: {{ .Values.placement | quote }}
  CONTEXTECF_MODE: "READ_ONLY"
  AGENT_API_ENABLED: {{ .Values.agentApi.enabled | quote }}
  AGENT_API_AUTH_MODE: {{ .Values.agentApi.authMode | quote }}
  AGENT_API_REQUIRE_OBO: {{ .Values.agentApi.requireOnBehalfOf | quote }}
  AGENT_API_RATE_LIMIT_CONTEXT: {{ .Values.agentApi.rateLimits.contextPacksPerMinute | quote }}
  AGENT_API_RATE_LIMIT_ACTIONS: {{ .Values.agentApi.rateLimits.actionsPerMinute | quote }}
  AUDIT_ENABLED: {{ .Values.audit.enabled | quote }}
  AUDIT_RETENTION_DAYS: {{ .Values.audit.retentionDays | quote }}
  EXECUTE_MODE_ENABLED: {{ .Values.policy.executeMode.enabled | quote }}
  EXECUTE_MODE_APPROVAL_REQUIRED: {{ .Values.policy.executeMode.approvalRequired | quote }}
  CCU_MONTHLY_LIMIT: {{ .Values.entitlements.ccu.monthlyLimit | quote }}
  CCU_BURST_LIMIT: {{ .Values.entitlements.ccu.burstLimitPerHour | quote }}
