# IMPORTANT: This is a template for secret references.
# All values use secretref: or kmsref: patterns.
# Replace these references with your actual secret manager references
# before deployment. NEVER commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: contextecf-secrets
  namespace: {{ include "contextecf.namespace" . }}
  labels:
    {{- include "contextecf.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.database.connectionRef | quote }}
  redis-url: {{ .Values.secrets.redis.connectionRef | quote }}
  jwt-secret: {{ .Values.secrets.jwt.secretRef | quote }}
  kms-key-ref: {{ .Values.secrets.kms.keyRef | quote }}
